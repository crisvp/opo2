services:
  postgres:
    image: postgres:16-alpine
    container_name: opo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opo_admin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opo
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: opo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    tmpfs:
      - /data

  rustfs:
    image: rustfs/rustfs:latest
    container_name: opo-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: minioadmin
      RUSTFS_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  clamav:
    image: clamav/clamav-debian:stable
    container_name: opo-clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    tmpfs:
      - /var/lib/clamav

  libreoffice-sidecar:
    build:
      context: ./docker/libreoffice-sidecar
      dockerfile: Dockerfile
    container_name: opo-libreoffice
    restart: unless-stopped
    ports:
      - "4000:4000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false
    tmpfs:
      - /tmp
      - /root/.config

  adminer:
    image: adminer:latest
    container_name: opo-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
